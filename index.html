<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CODE TUTOR // v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="prompt">&gt;</span> CODE_TUTOR<span class="cursor">_</span>
  </div>

  <div class="controls">
    <div class="seg" id="mode-toggle">
      <button class="seg-btn active" data-mode="problem">[ PROBLEM ]</button>
      <button class="seg-btn" data-mode="code">[ MY_CODE ]</button>
    </div>

    <label class="ctrl ctrl-hidden">
      <span>LANG</span>
      <select id="language">
        <option>Python</option>
        <option>Java</option>
        <option>C++</option>
        <option>JavaScript</option>
      </select>
    </label>

    <label class="ctrl ctrl-hidden">
      <span>MODEL</span>
      <select id="model"><option>loading</option></select>
    </label>

    <button id="run" class="primary" disabled>[ RUN ]</button>
  </div>
</header>

<div id="status" class="status hidden"></div>

<main class="split">
  <section class="pane">
    <div class="pane-header">
      <span id="input-label">// PASTE PROBLEM STATEMENT</span>
      <button id="clear" class="ghost">[ CLR ]</button>
    </div>
    <textarea id="input" spellcheck="false" placeholder="> e.g. Two Sum: Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target."></textarea>
  </section>

  <section class="pane">
    <div class="pane-header">
      <span>// OUTPUT</span>
      <span id="spinner" class="spinner hidden">[ ... ]</span>
    </div>
    <div id="output" class="output">
      <div class="empty">&gt; awaiting input<span class="cursor">_</span></div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="app.js"></script>
</body>
</html>
