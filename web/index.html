<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Code Tutor</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">Code Tutor</div>

  <div class="controls">
    <div class="seg" id="mode-toggle">
      <button class="seg-btn active" data-mode="problem">Problem statement</button>
      <button class="seg-btn" data-mode="code">Review my code</button>
    </div>

    <label class="ctrl">
      <span>Language</span>
      <select id="language">
        <option>Python</option>
        <option>Java</option>
        <option>C++</option>
        <option>JavaScript</option>
      </select>
    </label>

    <label class="ctrl">
      <span>Model</span>
      <select id="model"><option>loading…</option></select>
    </label>

    <button id="run" class="primary" disabled>Teach me</button>
  </div>
</header>

<div id="status" class="status hidden"></div>

<main class="split">
  <section class="pane">
    <div class="pane-header">
      <span id="input-label">Paste a problem statement</span>
      <button id="clear" class="ghost">Clear</button>
    </div>
    <textarea id="input" spellcheck="false" placeholder="e.g. Two Sum: Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target."></textarea>
  </section>

  <section class="pane">
    <div class="pane-header">
      <span>Explanation</span>
      <span id="spinner" class="spinner hidden"></span>
    </div>
    <div id="output" class="output">
      <div class="empty">The optimal solution, dry run, and complexity will appear here.</div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="app.js"></script>
</body>
</html>
